# /etc/nginx/sites-available/smartxcore.conf
#
# SmartCore LLC corporate website — smartxcore.com
#
# Static informational site about SmartCore LLC (the company),
# served from /opt/smartxcore-landing/. Designed to satisfy
# Dun & Bradstreet (D&B) and Better Business Bureau (BBB) business-
# verification reviews: clear company name, verifiable physical
# address, working phone number, full Privacy + Terms pages.
#
# The legacy backend service (worktrack-backend) and Next.js
# dashboard (worktrack-dashboard) that previously sat behind this
# domain are no longer surfaced here. Their systemd units may still
# be running on loopback for compatibility with older fleet
# binaries, but smartxcore.com itself returns only the static
# corporate landing now.
#
# Cloudflare proxies smartxcore.com (orange cloud); inner hop uses
# whatever cert is at /etc/letsencrypt/live/smartxcore.com/.

# === HTTP → HTTPS redirect ===
server {
    listen 80;
    listen [::]:80;
    server_name smartxcore.com www.smartxcore.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://smartxcore.com$request_uri;
    }
}

# === www → apex redirect ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.smartxcore.com;

    ssl_certificate     /etc/letsencrypt/live/smartxcore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartxcore.com/privkey.pem;

    return 301 https://smartxcore.com$request_uri;
}

# === Main server block (corporate landing) ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smartxcore.com;

    # === TLS ===
    ssl_certificate     /etc/letsencrypt/live/smartxcore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartxcore.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # === Security headers ===
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # === Static site root ===
    root /opt/smartxcore-landing;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
