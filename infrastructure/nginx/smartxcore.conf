# /etc/nginx/sites-available/smartxcore.conf
#
# Single-domain reverse proxy:
#   smartxcore.com/api/*  → Go backend (127.0.0.1:8080)
#   smartxcore.com/*      → Next.js dashboard (127.0.0.1:3000)
#
# Both backend and dashboard run on the same VPS as separate systemd services.
# nginx terminates TLS; backend and dashboard listen on loopback only.

# Rate limit zones (10 MB shared memory ≈ 160k IPs).
limit_req_zone $binary_remote_addr zone=agent_zone:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=admin_zone:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;

# === HTTP → HTTPS redirect ===
server {
    listen 80;
    listen [::]:80;
    server_name smartxcore.com www.smartxcore.com;
    return 301 https://smartxcore.com$request_uri;
}

# === www → apex redirect ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.smartxcore.com;

    ssl_certificate     /etc/letsencrypt/live/smartxcore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartxcore.com/privkey.pem;

    return 301 https://smartxcore.com$request_uri;
}

# === Main server block ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smartxcore.com;

    # === TLS ===
    ssl_certificate     /etc/letsencrypt/live/smartxcore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartxcore.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # === Security headers ===
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # === Body size & timeouts ===
    client_max_body_size       8M;
    client_body_timeout        30s;
    keepalive_timeout          75s;
    proxy_connect_timeout      10s;
    proxy_send_timeout         60s;
    proxy_read_timeout         60s;

    # === Login endpoint: tighter rate limit ===
    location = /api/v1/auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # === Agent SSE stream — long-lived push channel ===
    # Must come BEFORE the generic /api/v1/agent/ prefix block; nginx
    # picks an exact-match (=) location ahead of any prefix match.
    # Disable buffering and bump read_timeout to one day so the
    # backend can hold the connection open indefinitely. The 25s
    # server-side ping ensures any half-open TCP gets discovered well
    # within that window.
    #
    # We DON'T include proxy-headers.conf here because that snippet
    # sets `Connection: upgrade` (intended for WebSocket) — SSE wants
    # `Connection: keep-alive`. We replicate just the headers SSE
    # needs and add the streaming-friendly directives.
    location = /api/v1/agent/stream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
        chunked_transfer_encoding on;
    }

    # === Agent endpoints ===
    location /api/v1/agent/ {
        limit_req zone=agent_zone burst=200 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # === Admin + auth endpoints ===
    location /api/ {
        limit_req zone=admin_zone burst=30 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # === Health probes (no rate limit so monitoring tools never trigger 429) ===
    location = /healthz { proxy_pass http://127.0.0.1:8080; access_log off; }
    location = /readyz  { proxy_pass http://127.0.0.1:8080; access_log off; }

    # === Dashboard (Next.js) — everything else ===
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_buffering off;  # streaming Next.js responses
    }

    # === Static / installer downloads (optional, served from disk) ===
    location /downloads/ {
        alias /opt/worktrack/downloads/;
        autoindex off;
        add_header Content-Disposition 'attachment';
    }
}
