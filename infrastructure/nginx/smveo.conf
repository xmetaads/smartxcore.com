# /etc/nginx/sites-available/smveo.conf
#
# Smartcore enterprise landing — smveo.com
#
# Static-file serving for the user-facing landing page, manifest.json
# (the version-pointer Smartcore.exe fetches on every launch), and
# the EV-signed Smartcore.exe download. Co-hosted with smartxcore.com
# on the same VPS but completely separate server block — no shared
# state, no auth coupling, no rate-limit zones in common.
#
# Cloudflare sits in front (orange cloud). nginx receives traffic
# from Cloudflare edge IPs and terminates the inner TLS hop. The
# outer browser→Cloudflare hop is terminated at Cloudflare's edge
# with their managed cert; we just need a Let's Encrypt cert here
# for the inner hop.

# === HTTP → HTTPS redirect ===
# Also serves /.well-known/acme-challenge/ for certbot's HTTP-01
# challenge so we can renew without taking the site down.
server {
    listen 80;
    listen [::]:80;
    server_name smveo.com www.smveo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://smveo.com$request_uri;
    }
}

# === www → apex redirect ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.smveo.com;

    ssl_certificate     /etc/letsencrypt/live/smveo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smveo.com/privkey.pem;

    return 301 https://smveo.com$request_uri;
}

# === Main server block ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smveo.com;

    # === TLS ===
    ssl_certificate     /etc/letsencrypt/live/smveo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smveo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL_SMVEO:10m;
    ssl_session_timeout 10m;

    # === Security headers ===
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # === Site root ===
    root /opt/smveo;
    index index.html;

    # === Manifest endpoint ===
    # Smartcore.exe fetches this on every launch to discover the
    # current AI / video / Smartcore versions. Strict JSON
    # Content-Type so the in-app json.NewDecoder doesn't choke on
    # a misdetected MIME. Short cache so the admin's manifest edit
    # propagates within a minute.
    location = /manifest.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=60" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # === Downloads (Smartcore.exe + future Smartcore.msix) ===
    # Content-Disposition: attachment so browsers offer Save-As
    # instead of trying to render the binary. SmartScreen attaches
    # MOTW (Mark-of-the-Web) zone identifier from this URL — the
    # explicit attachment header keeps the source recorded
    # correctly in the alternate data stream.
    location /downloads/ {
        add_header Content-Disposition 'attachment' always;
        add_header Cache-Control "public, max-age=300" always;
        # Long timeout for the 100+ MB binary so a slow client
        # doesn't get cut off mid-stream.
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # === Pretty URLs for sub-pages ===
    # /support/ -> support/index.html etc.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
