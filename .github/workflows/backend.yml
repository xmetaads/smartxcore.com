name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"

# Force Node 24 for actions still shipping Node 20 entrypoints (deprecated
# Sept 2026). Removes the yellow deprecation annotation on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: backend/go.sum

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        run: go test -race -cover ./...

      - name: Build
        working-directory: backend
        run: go build -o /tmp/server ./cmd/server

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: backend/go.sum

      # Replaced golangci-lint-action with a manual staticcheck +
      # govulncheck pair: the action v6 was leaking its scan into the
      # whole repo (picking up agent/installer files it had no module
      # context for) and using a bundled Go that lagged the toolchain
      # we'd asked for, producing spurious "undefined: fiber" and
      # "go1.26 features built with go1.24" failures. The two tools
      # below cover the same ground deterministically and match what
      # the agent workflow runs.

      - name: Staticcheck
        working-directory: backend
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker:
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          push: false
          tags: worktrack-backend:ci-${{ github.sha }}
