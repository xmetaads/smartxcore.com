<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Video</title>
    <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
    <div class="window">
        <!-- Title bar / brand strip -->
        <header class="title-bar">
            <div class="brand">
                <div class="brand-logo" aria-hidden="true">
                    <!-- Smart Video play-button-on-camera-roll mark, matches smveo.com favicon -->
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <div class="brand-name">Smart Video</div>
                    <div class="brand-tagline">The world's first AI video platform</div>
                </div>
            </div>
            <div class="title-actions">
                <button id="btn-folder" class="icon-btn" title="Open install folder">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                </button>
                <button id="btn-refresh" class="icon-btn" title="Check for updates">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"/>
                        <polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Hero panel -->
        <main class="hero">
            <div class="hero-status">
                <div id="status-icon" class="status-icon status-icon-idle" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </div>
                <div class="hero-text">
                    <h1 id="status-title">Starting…</h1>
                    <p id="status-subtitle">Smart Video is checking the latest version with the server.</p>
                </div>
            </div>

            <!-- Version row -->
            <div class="versions">
                <div class="version-item">
                    <div class="version-label">Installed</div>
                    <div class="version-value" id="ai-installed">—</div>
                </div>
                <div class="version-arrow">→</div>
                <div class="version-item">
                    <div class="version-label">Latest</div>
                    <div class="version-value" id="ai-available">—</div>
                </div>
            </div>

            <!-- Progress bar (hidden by default) -->
            <div id="progress-row" class="progress-row hidden">
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div id="progress-label" class="progress-label">0%</div>
            </div>

            <!-- Action buttons -->
            <div class="actions">
                <button id="btn-install" class="btn btn-primary">
                    <span class="btn-text">Install AI</span>
                </button>
                <button id="btn-launch" class="btn btn-secondary" disabled>
                    <span class="btn-text">Launch AI</span>
                </button>
            </div>

            <!-- Inline error / info banner -->
            <div id="banner" class="banner hidden"></div>
        </main>

        <!-- Footer with version + brand -->
        <footer class="status-bar">
            <span class="status-item" id="footer-version">Smart Video 1.0.0</span>
            <span class="status-divider">•</span>
            <span class="status-item">smveo.com</span>
        </footer>
    </div>

    <script src="./src/main.js" type="module"></script>
</body>
</html>
