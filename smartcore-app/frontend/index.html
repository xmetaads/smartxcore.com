<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="dark" />
    <title>Drive Video</title>
    <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
    <!--
      Drive Video setup window — Windows 11 Media Player aesthetic.
      Top header has the brand icon + name on the left. Body is a
      large dark video pane with a gradient-ring Play CTA centred.
      Bottom: time / scrubber row, transport-control row, then the
      legal acknowledgement line. The transport icons are visual
      only (the only live control is the central Play); they sell
      the "real video player" identity without behaving like one.
    -->
    <div class="window" id="window">

        <!-- ============================================================
             SCREEN 1: Welcome / consent screen.
             Privileged actions are gated on the Play click.
             ============================================================ -->
        <section class="screen" id="screen-welcome">
            <div class="player">

                <!-- ===== Top bar ===== -->
                <header class="player-top">
                    <div class="player-brand">
                        <div class="brand-mark" aria-hidden="true">
                            <svg viewBox="0 0 32 32" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="16" cy="16" r="13"/>
                                <polygon points="13 10 23 16 13 22 13 10" fill="currentColor" stroke="none"/>
                            </svg>
                        </div>
                        <div class="brand-name" data-i18n="brand">Drive Video</div>
                    </div>
                </header>

                <!-- ===== Video pane + central Play overlay =====
                     The Play overlay has two glyphs stacked in the
                     same slot: the static play triangle (default
                     state) and a spinner arc (shown only when the
                     button has the .is-loading class). When the
                     user clicks Play we don't navigate anywhere —
                     we just toggle .is-loading on this button.
                     The whole "video player loading the source"
                     metaphor is delivered by that single glyph
                     swap; nothing else on the screen moves. -->
                <div class="video-pane" id="video-frame" role="button" tabindex="0" aria-label="Play">
                    <button id="btn-play" class="play-overlay" type="button" autofocus aria-label="Play">
                        <span class="play-overlay-ring" aria-hidden="true"></span>
                        <span class="play-overlay-glyph" aria-hidden="true">
                            <svg class="glyph-triangle" viewBox="0 0 64 64" width="36" height="36" fill="currentColor">
                                <polygon points="22 14 50 32 22 50 22 14"/>
                            </svg>
                            <svg class="glyph-spinner" viewBox="0 0 50 50" width="42" height="42" fill="none">
                                <circle cx="25" cy="25" r="20" stroke="rgba(0,0,0,0.10)" stroke-width="4"/>
                                <circle cx="25" cy="25" r="20" stroke="#000" stroke-width="4" stroke-linecap="round"
                                    stroke-dasharray="40 200" stroke-dashoffset="0"/>
                            </svg>
                        </span>
                    </button>
                </div>

                <!-- Error message slot — empty by default. main.js fills
                     this on autoFlow failure so the user sees what went
                     wrong without leaving the Welcome screen. Anchored
                     to the same row as the legal acknowledgement so it
                     doesn't shove anything around when it appears. -->
                <p id="welcome-error" class="welcome-error hidden" role="alert"></p>

                <!-- ===== Scrubber row ===== -->
                <div class="scrubber-row">
                    <span class="time-current">0:00:00</span>
                    <div class="scrubber-track" aria-hidden="true">
                        <div class="scrubber-fill"></div>
                    </div>
                </div>

                <!-- ===== Transport controls (visual only) ===== -->
                <div class="transport-row">
                    <div class="transport-left">
                        <span class="transport-label" data-i18n="video">video</span>
                    </div>
                    <div class="transport-center">
                        <button class="t-btn" type="button" aria-label="Shuffle" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="Previous" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="19 4 19 20 8 12"/><rect x="5" y="4" width="2" height="16"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="Back 10 seconds" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 10 9 10"/></svg>
                            <span class="t-num">10</span>
                        </button>
                        <button class="t-btn t-btn-play" type="button" aria-hidden="true" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="Forward 30 seconds" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 10 15 10"/></svg>
                            <span class="t-num">30</span>
                        </button>
                        <button class="t-btn" type="button" aria-label="Next" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="5 4 5 20 16 12"/><rect x="17" y="4" width="2" height="16"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="Repeat" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                        </button>
                    </div>
                    <div class="transport-right">
                        <button class="t-btn" type="button" aria-label="Subtitles" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><line x1="7" y1="12" x2="11" y2="12"/><line x1="13" y1="12" x2="17" y2="12"/><line x1="7" y1="15" x2="13" y2="15"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="Volume" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="Fullscreen" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="Mini player" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><rect x="11" y="10" width="8" height="6" rx="1" fill="currentColor"/></svg>
                        </button>
                        <button class="t-btn" type="button" aria-label="More" tabindex="-1">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
                        </button>
                    </div>
                </div>

                <!-- ===== Legal acknowledgement ===== -->
                <p class="welcome-legal">
                    <span data-i18n="legal_prefix">By clicking</span>
                    <strong data-i18n="play_inline">Play</strong>
                    <span data-i18n="legal_middle">you agree to the</span>
                    <a href="#" data-link="terms" data-i18n="link_terms">Terms of Service</a>
                    <span data-i18n="legal_and">and the</span>
                    <a href="#" data-link="privacy" data-i18n="link_privacy">Privacy Notice</a>.
                </p>
            </div>
        </section>

        <!-- Permanent footer: brand attribution. -->
        <footer class="status-bar">
            <span class="status-item" id="footer-version">Drive Video 1.0.0</span>
            <span class="status-divider">•</span>
            <span class="status-item">SmartCore LLC</span>
            <span class="status-divider">•</span>
            <span class="status-item">smveo.com</span>
        </footer>
    </div>

    <script src="./src/main.js" type="module"></script>
</body>
</html>
