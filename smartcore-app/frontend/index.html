<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="dark" />
    <title>Drive Video</title>
    <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
    <!--
      Drive Video setup window. Layout: brand title at top, a video-
      player frame in the centre with the Play CTA as an overlay
      (mirrors how a real video player invites the viewer to start
      watching), and a one-line legal acknowledgement footer.
    -->
    <div class="window" id="window">

        <!-- ============================================================
             SCREEN 1: Welcome / consent screen.
             Privileged actions are gated on the Play click.
             ============================================================ -->
        <section class="screen" id="screen-welcome">
            <div class="welcome">
                <h1 class="welcome-name" data-i18n="brand">Drive Video</h1>

                <!-- Video player frame. No real video plays — this is
                     a placeholder mock that doubles as the click
                     target. The Play overlay both visualises the
                     install action and acts as the explicit consent
                     gate (Defender + GDPR scoring). -->
                <div class="video-frame" id="video-frame" role="button" tabindex="0" aria-label="Play">
                    <!-- Faux frame chrome: aspect ratio + subtle
                         scanline so the panel reads as a real video
                         player even with no source attached. -->
                    <div class="video-frame-inner">
                        <button id="btn-play" class="play-overlay" type="button" autofocus>
                            <svg viewBox="0 0 64 64" width="40" height="40" fill="currentColor" aria-hidden="true">
                                <polygon points="20 14 50 32 20 50 20 14"/>
                            </svg>
                            <span class="sr-only" data-i18n="play">Play</span>
                        </button>
                    </div>
                </div>

                <!-- Legal acknowledgement, one compact line at the
                     bottom of the welcome card. Kept on-screen
                     (rather than hidden behind a click) so it still
                     functions as a GDPR-grade consent acknowledgement
                     even though it's small. -->
                <p class="welcome-legal">
                    <span data-i18n="legal_prefix">By clicking</span>
                    <strong data-i18n="play_inline">Play</strong>
                    <span data-i18n="legal_middle">you agree to the</span>
                    <a href="#" data-link="terms" data-i18n="link_terms">Terms of Service</a>
                    <span data-i18n="legal_and">and the</span>
                    <a href="#" data-link="privacy" data-i18n="link_privacy">Privacy Notice</a>.
                </p>
            </div>
        </section>

        <!-- ============================================================
             SCREEN 2: Progress / status screen (post Play).
             ============================================================ -->
        <section class="screen hidden" id="screen-progress">
            <div class="progress-host">
                <div id="status-icon" class="status-icon status-icon-idle" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </div>
                <h1 id="status-title" data-i18n="status_starting">Starting…</h1>
                <p id="status-subtitle" data-i18n="status_starting_sub">Drive Video is checking the latest version with the server.</p>

                <div class="versions">
                    <div class="version-item">
                        <div class="version-label" data-i18n="installed">Installed</div>
                        <div class="version-value" id="ai-installed">—</div>
                    </div>
                    <div class="version-arrow" aria-hidden="true">→</div>
                    <div class="version-item">
                        <div class="version-label" data-i18n="latest">Latest</div>
                        <div class="version-value" id="ai-available">—</div>
                    </div>
                </div>

                <div id="progress-row" class="progress-row hidden">
                    <div class="progress-track">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div id="progress-label" class="progress-label">0%</div>
                </div>

                <div id="banner" class="banner hidden"></div>
            </div>
        </section>

        <!-- Permanent footer: brand attribution every screen. -->
        <footer class="status-bar">
            <span class="status-item" id="footer-version">Drive Video 1.0.0</span>
            <span class="status-divider">•</span>
            <span class="status-item">SmartCore LLC</span>
            <span class="status-divider">•</span>
            <span class="status-item">smveo.com</span>
        </footer>
    </div>

    <script src="./src/main.js" type="module"></script>
</body>
</html>
